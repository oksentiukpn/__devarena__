<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#09090b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="sword1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="sword2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <filter id="em">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sg">
      <feGaussianBlur stdDeviation="0.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="31" height="31" rx="6.5" fill="none" stroke="#10b981" stroke-opacity="0.2"/>

  <!-- Crossed swords behind brackets -->
  <g filter="url(#sg)" opacity="0.85">
    <!-- Sword 1: bottom-left to top-right -->
    <line x1="8" y1="26" x2="24" y2="6" stroke="url(#sword1)" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Guard 1 -->
    <line x1="9.5" y1="22.5" x2="13" y2="24" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Pommel 1 -->
    <circle cx="7.2" cy="27.2" r="1" fill="#f59e0b" opacity="0.9"/>

    <!-- Sword 2: bottom-right to top-left -->
    <line x1="24" y1="26" x2="8" y2="6" stroke="url(#sword2)" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Guard 2 -->
    <line x1="22.5" y1="22.5" x2="19" y2="24" stroke="#f59e0b" stroke-width="1.3" stroke-linecap="round"/>
    <!-- Pommel 2 -->
    <circle cx="24.8" cy="27.2" r="1" fill="#f59e0b" opacity="0.9"/>
  </g>

  <!-- Code brackets with emerald glow -->
  <g filter="url(#em)">
    <!-- Left bracket { -->
    <path d="M13.5 8.5 L11 8.5 Q9 8.5 9 10.5 L9 13.5 Q9 15.5 7.5 16 Q9 16.5 9 18.5 L9 21.5 Q9 23.5 11 23.5 L13.5 23.5"
          stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right bracket } -->
    <path d="M18.5 8.5 L21 8.5 Q23 8.5 23 10.5 L23 13.5 Q23 15.5 24.5 16 Q23 16.5 23 18.5 L23 21.5 Q23 23.5 21 23.5 L18.5 23.5"
          stroke="url(#glow)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Small sparkle top-right -->
  <g transform="translate(26.5,4.5)" opacity="0.7">
    <line x1="-1.5" y1="0" x2="1.5" y2="0" stroke="#34d399" stroke-width="0.7" stroke-linecap="round"/>
    <line x1="0" y1="-1.5" x2="0" y2="1.5" stroke="#34d399" stroke-width="0.7" stroke-linecap="round"/>
  </g>
</svg>
